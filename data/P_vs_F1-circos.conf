#--------------------------------------------
# Circos configuration
#--------------------------------------------
<<include etc/colors_fonts_patterns.conf>>
<<include etc/housekeeping.conf>>

<image>
<<include etc/image.conf>>
</image>

#--------------------------------------------
# Genome / ideograms
#--------------------------------------------
<<include conf/ticks.conf>>

karyotype = data/P_vs_F1_karyotype.txt
chromosomes_units = 100000
chromosomes_display_default = yes


<ideogram>
<spacing>
default = 0.005r
</spacing>
radius    = 0.90r
thickness = 40p
fill      = yes
</ideogram>

#--------------------------------------------
# Output image (define ONLY here)
#--------------------------------------------
<image>
dir =  /research/groups/ma1grp/home/zyu/work_2026/RNA_seq_3_March/re_anlysis/3_interactive_with_SV/output/JB251030/circle_plot
file  = P_vs_F1.png
</image>

#=================================================================
#+++++++++++++++++++++++  Highlights  ++++++++++++++++++++++++++++++++
#=================================================================
#--------------------------------------------
# oric_ter
#--------------------------------------------
<highlights>
<highlight>
file = data/P_vs_F1_oriC.txt
r0 = 1r
r1 = 1.1r
</highlight>
#--------------------------------------------
# Region_sv_file
#--------------------------------------------
<highlight>
file = data/P_vs_F1_sv.txt
r0 = 0.98r
r1 = 1.02r
</highlight>
#--------------------------------------------
# P_value
#--------------------------------------------
<highlight>
file = data/P_vs_F1_sig.txt
r0 = 0.80r
r1 = 0.90r
</highlight>

</highlights>

#=================================================================
#+++++++++++++++++++++++  Plots  ++++++++++++++++++++++++++++++++
#=================================================================

<plots>

#--------------------------------------------
# log2fc
#--------------------------------------------
<plot>
type = histogram
file = data/P_vs_F1_log2fc.txt
r0   = 0.52r
r1   = 0.75r
min = -5
max = 5

<rules>
<rule>
condition  = var(value) > 0
fill_color = red
</rule>
<rule>
condition  = var(value) < 0
fill_color = green
</rule>
</rules>
</plot>

#--------------------------------------------
# SV labels
#--------------------------------------------
<plot>
type  = text
file  = data/P_vs_F1_sv_labels.txt

r0 = 1.05r
r1 = 1.20r
label_size = 30p

label_font     = bold
label_parallel = yes

padding        = 0p   
</plot>

</plots>

