#--------------------------------------------
# Circos configuration
#--------------------------------------------
<<include etc/colors_fonts_patterns.conf>>
<<include etc/housekeeping.conf>>

<image>
<<include etc/image.conf>>
</image>

#--------------------------------------------
# Genome / ideograms
#--------------------------------------------
<<include conf/ticks.conf>>

karyotype = data/karyotype_file.txt
chromosomes_units = 100000
chromosomes_display_default = yes


<ideogram>
<spacing>
default = 0.005r
</spacing>
radius    = 0.90r
thickness = 40p
fill      = yes
</ideogram>

#--------------------------------------------
# Output image (define ONLY here)
#--------------------------------------------
<image>
dir =  output_path
file  = file_name.png
</image>

#=================================================================
#+++++++++++++++++++++++  Highlights  ++++++++++++++++++++++++++++++++
#=================================================================
#--------------------------------------------
# oric_ter
#--------------------------------------------
<highlights>
<highlight>
file = data/oric_ter_file.txt
r0 = 1r
r1 = 1.1r
</highlight>
#--------------------------------------------
# Region_sv_file
#--------------------------------------------
<highlight>
file = data/Region_sv_file.txt
r0 = 0.98r
r1 = 1.02r
</highlight>
#--------------------------------------------
# P_value
#--------------------------------------------
<highlight>
file = data/P_value_file.txt
r0 = 0.80r
r1 = 0.90r
</highlight>

</highlights>

#=================================================================
#+++++++++++++++++++++++  Plots  ++++++++++++++++++++++++++++++++
#=================================================================

<plots>

#--------------------------------------------
# log2fc
#--------------------------------------------
<plot>
type = histogram
file = data/log2fc_file.txt
r0   = 0.52r
r1   = 0.75r
min = -5
max = 5

<rules>
<rule>
condition  = var(value) > 0
fill_color = red
</rule>
<rule>
condition  = var(value) < 0
fill_color = green
</rule>
</rules>
</plot>

#--------------------------------------------
# SV labels
#--------------------------------------------
<plot>
type  = text
file  = data/sv_labels_file.txt

r0 = 1.05r
r1 = 1.20r
label_size = 30p

label_font     = bold
label_parallel = yes

padding        = 0p   
</plot>

</plots>

