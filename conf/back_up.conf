<<include etc/colors_fonts_patterns.conf>>
<<include etc/housekeeping.conf>>
<image>
<<include etc/image.conf>>
</image>

<<include ticks.conf>>
karyotype = karyotype.txt
chromosomes_units = 100000
chromosomes_display_default = yes


<ideogram>
<spacing>
default = 0.005r
</spacing>
radius    = 0.90r
thickness = 40p
fill      = yes
</ideogram>


<image>
dir =  /research/groups/ma1grp/home/zyu/work_2025/RNA_seq_12_Dec/circle_analysis/example
file  = circos-tutorial.png
</image>

<highlights>
<highlight>
file = oric_ter_mark.txt
r0 = 0.95r
r1 = 0.98r
</highlight>
</highlights>


<plots>
<plot>
type = histogram
file = log2fc.txt
r1   = 0.85r
r0   = 0.65r
min = -5
max = 5

<rules>
<rule>
condition  = var(value) > 0
fill_color = red
</rule>
<rule>
condition  = var(value) < 0
fill_color = blue
</rule>
</rules>
</plot>

<plot>
type = histogram
file = padj.txt
r1   = 0.60r
r0   = 0.40r
fill_color = black
min = 0
max = 20
</plot>

<plot>
type       = text
file       = oric_ter_label.txt
r0 = 0.95r
r1 = 0.98r
label_font = bold
label_size = 54p
color      = black
padding    = 2p
</plot>

</plots>

